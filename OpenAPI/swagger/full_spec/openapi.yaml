components:
  schemas:
    BORegistration:
      required:
        - boURL
      type: object
      properties:
        boURL:
          type: string
          format: URI
        username:
          type: string
        password:
          type: string
        apiKey:
          type: string
      example:
        password: password
        apiKey: apiKey
        boURL: boURL
        username: username
    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
    CreateDigitalBatteryPassportResponse:
      required:
        - DBPId
      type: object
      properties:
        DBPId:
          type: string
      example:
        DBPId: DBPId
    Performance:
      required:
        - batteryCondition
        - batteryTechnicalProperties
      type: object
      properties:
        batteryTechnicalProperties:
          $ref: "#/components/schemas/Performance_batteryTechnicalProperties"
        batteryCondition:
          $ref: "#/components/schemas/Performance_batteryCondition"
      additionalProperties: false
      description: "DIN Cluster - Capacity energy and voltage, Power capability, Energy\
        \ efficiency, Internal resistance, Battery lifetime, Temperature conditions"
      example:
        batteryCondition:
          internalResistanceIncrease:
            - lastUpdateInternalResistanceIncrease: 2000-01-23T04:56:07.000+00:00
              batteryComponent: batteryComponent
              internalResistanceIncreaseValue: 6.965117697638846
            - lastUpdateInternalResistanceIncrease: 2000-01-23T04:56:07.000+00:00
              batteryComponent: batteryComponent
              internalResistanceIncreaseValue: 6.965117697638846
          capacityFade:
            capacityFadeValue: 3.5571952270680973
            lastUpdate: 2000-01-23T04:56:07.000+00:00
        batteryTechnicalProperties:
          originalPowerCapability:
            - powerCapabilityAt: 9.301444243932576
              atSoC: 3.616076749251911
            - powerCapabilityAt: 9.301444243932576
              atSoC: 3.616076749251911
          roundTripEfficiencyat50PerCentCycleLife: 4.965218492984954
          maximumVoltage: 6.84685269835264
          ratedEnergy: 7.457744773683766
          expectedLifetime: -26052
          ratedMaximumPower: 5.025004791520295
          capacityThresholdForExhaustion: 4.145608029883936
          lifetimeReferenceTest: lifetimeReferenceTest
          temperatureRangeIdleState:
            maximum: 9.369310271410669
            minimum: 6.683562403749608
          ratedCapacity: 2.027123023002322
          nominalVoltage: 7.386281948385884
          minimumVoltage: 8.762042012749001
          roundTripEfficiencyFade: 5.637376656633329
          powerFade: 1.4894159098541704
          initialSelfDischarge: 9.018348186070783
          cRate: 2.3021358869347655
          initialInternalResistance:
            - ohmicResistance: 7.061401241503109
              batteryComponent: batteryComponent
            - ohmicResistance: 7.061401241503109
              batteryComponent: batteryComponent
          cRateLifeCycleTest: 1.1730742509559433
          roundtripEfficiency: 9.965781217890562
          powerCapabilityRatio: 1.2315135367772556
          expectedNumberOfCycles: 2147483647
    DynamicUpdate:
      required:
        - generalProductInformation
        - lastUpdate
        - performance
      type: object
      properties:
        lastUpdate:
          type: string
          format: date-time
        generalProductInformation:
          $ref: "#/components/schemas/DynamicUpdate_generalProductInformation"
        performance:
          $ref: "#/components/schemas/Performance"
      additionalProperties: false
      example:
        generalProductInformation:
          operatorInformation:
            identifier: identifier
          batteryStatus: batteryStatus
        performance: null
        lastUpdate: 2000-01-23T04:56:07.000+00:00
    HazardousSubstance:
      required:
        - hazardousSubstanceIdentifier
        - hazardousSubstanceImpact
        - hazardousSubstanceLocation
      type: object
      properties:
        hazardousSubstanceIdentifier:
          type: string
        hazardousSubstanceImpact:
          minItems: 1
          type: array
          items:
            type: string
        hazardousSubstanceLocation:
          $ref: "#/components/schemas/HazardousSubstance_hazardousSubstanceLocation"
      additionalProperties: false
      description: "DIN 6.5.5, 6.5.6"
      example:
        hazardousSubstanceIdentifier: hazardousSubstanceIdentifier
        hazardousSubstanceImpact:
          - hazardousSubstanceImpact
          - hazardousSubstanceImpact
        hazardousSubstanceLocation:
          componentName: componentName
    BatteryMaterial:
      required:
        - batteryMaterial
        - batteryMaterialLocation
        - isCriticalRawMaterial
      type: object
      properties:
        batteryMaterial:
          type: string
        batteryMaterialLocation:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/BatteryMaterial_batteryMaterialLocation"
        isCriticalRawMaterial:
          type: boolean
          description: DIN 6.5.3 - boolean
      additionalProperties: false
      description: "Each object = different material DIN 6.5.3, 6.5.4"
      example:
        batteryMaterialLocation:
          - componentName: componentName
          - componentName: componentName
        isCriticalRawMaterial: true
        batteryMaterial: batteryMaterial
    MaterialComposition:
      required:
        - batteryChemistry
        - batteryMaterials
        - hazardousSubstances
      type: object
      properties:
        batteryChemistry:
          $ref: "#/components/schemas/MaterialComposition_batteryChemistry"
        hazardousSubstances:
          minItems: 1
          type: array
          description: |-
            DIN 6.5.5, 6.5.6
             Each object = different hazardous substance
          items:
            $ref: "#/components/schemas/HazardousSubstance"
        batteryMaterials:
          minItems: 1
          type: array
          description: "Each object = different material DIN 6.5.3, 6.5.4"
          items:
            $ref: "#/components/schemas/BatteryMaterial"
      additionalProperties: false
      description: DIN Cluster - Material and composition
      example:
        hazardousSubstances:
          - hazardousSubstanceIdentifier: hazardousSubstanceIdentifier
            hazardousSubstanceImpact:
              - hazardousSubstanceImpact
              - hazardousSubstanceImpact
            hazardousSubstanceLocation:
              componentName: componentName
          - hazardousSubstanceIdentifier: hazardousSubstanceIdentifier
            hazardousSubstanceImpact:
              - hazardousSubstanceImpact
              - hazardousSubstanceImpact
            hazardousSubstanceLocation:
              componentName: componentName
        batteryChemistry:
          clearName: clearName
          shortName: shortName
        batteryMaterials:
          - batteryMaterialLocation:
              - componentName: componentName
              - componentName: componentName
            isCriticalRawMaterial: true
            batteryMaterial: batteryMaterial
          - batteryMaterialLocation:
              - componentName: componentName
              - componentName: componentName
            isCriticalRawMaterial: true
            batteryMaterial: batteryMaterial
    Circularity:
      required:
        - endOfLifeInformation
        - recycledContent
        - renewableContent
        - sparePartSources
      type: object
      properties:
        renewableContent:
          type: number
          description: DIN 6.6.2.11
        recycledContent:
          maxItems: 4
          minItems: 4
          type: array
          items:
            $ref: "#/components/schemas/Circularity_recycledContent"
        sparePartSources:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/Circularity_sparePartSources"
        endOfLifeInformation:
          $ref: "#/components/schemas/Circularity_endOfLifeInformation"
      additionalProperties: false
      description: "DIN Cluster - Circularity, Recycled content, Waste prevention"
      example:
        renewableContent: 0.8008281904610115
        recycledContent:
          - recycledMaterial: recycledMaterial
            postConsumerShare: 6.027456183070403
            preConsumerShare: 1.4658129805029452
          - recycledMaterial: recycledMaterial
            postConsumerShare: 6.027456183070403
            preConsumerShare: 1.4658129805029452
          - recycledMaterial: recycledMaterial
            postConsumerShare: 6.027456183070403
            preConsumerShare: 1.4658129805029452
          - recycledMaterial: recycledMaterial
            postConsumerShare: 6.027456183070403
            preConsumerShare: 1.4658129805029452
        endOfLifeInformation:
          wastePrevention: wastePrevention
          separateCollection: separateCollection
          informationOnCollection: informationOnCollection
        sparePartSources:
          - components:
              - partName: partName
              - partName: partName
            nameOfSupplier: nameOfSupplier
          - components:
              - partName: partName
              - partName: partName
            nameOfSupplier: nameOfSupplier
    SupplyChainDueDiligence:
      required:
        - supplyChainDueDiligenceReport
        - supplyChainIndices
        - thirdPartyAssurances
      type: object
      properties:
        supplyChainDueDiligenceReport:
          type: string
          description: DIN 6.4.2
        supplyChainIndices:
          type: number
          description: DIN 6.4.3
        thirdPartyAssurances:
          type: string
          description: DIN 6.4.3
      additionalProperties: false
      description: DIN Cluster - Supply chain due diligence
      example:
        supplyChainDueDiligenceReport: supplyChainDueDiligenceReport
        supplyChainIndices: 5.962133916683182
        thirdPartyAssurances: thirdPartyAssurances
    CarbonFootprint:
      required:
        - batteryCarbonFootprint
        - carbonFootprintPerLifecycleStage
        - carbonFootprintPerformanceClass
        - carbonFootprintStudy
      type: object
      properties:
        absoluteCarbonFootprint:
          type: number
          description: DIN 6.3.10
        carbonFootprintPerformanceClass:
          type: string
          description: DIN 6.3.7
        carbonFootprintStudy:
          type: string
          description: DIN 6.3.8
        batteryCarbonFootprint:
          type: number
          description: DIN 6.3.2
        carbonFootprintPerLifecycleStage:
          $ref: "#/components/schemas/CarbonFootprint_carbonFootprintPerLifecycleStage"
      additionalProperties: false
      description: DIN Cluster - Carbon Footprint
      example:
        absoluteCarbonFootprint: 1.284659006116532
        carbonFootprintStudy: carbonFootprintStudy
        carbonFootprintPerformanceClass: carbonFootprintPerformanceClass
        carbonFootprintPerLifecycleStage:
          carbonFootprintPerLifecycleStage1:
            - lifecycleStage: lifecycleStage
              carbonFootprint: 6.778324963048013
            - lifecycleStage: lifecycleStage
              carbonFootprint: 6.778324963048013
        batteryCarbonFootprint: 2.8841621266687802
    GeneralProductInformation:
      required:
        - batteryCategory
        - batteryMass
        - manufacturerInformation
        - manufacturingDate
        - manufacturingPlace
        - productIdentifier
        - puttingIntoService
        - warrantyPeriod
      type: object
      properties:
        manufacturerInformation:
          $ref: "#/components/schemas/GeneralProductInformation_manufacturerInformation"
        puttingIntoService:
          type: string
          description: DIN 6.1.3.3
          format: date-time
        manufacturingDate:
          type: string
          description: DIN 6.1.3.2
          format: date-time
        operatorInformation:
          $ref: "#/components/schemas/GeneralProductInformation_operatorInformation"
        batteryMass:
          type: number
          description: DIN 6.1.3.6
        manufacturingPlace:
          $ref: "#/components/schemas/GeneralProductInformation_manufacturingPlace"
        productIdentifier:
          type: string
          description: DIN 6.1.2.2
        warrantyPeriod:
          type: string
          description: DIN 6.1.3.4
        batteryCategory:
          type: string
          description: DIN 6.1.3.5
        batteryPassportIdentifier:
          type: string
          description: DIN 6.1.2.1
      additionalProperties: false
      description: DIN Cluster - Identifiers and product data
      example:
        batteryCategory: batteryCategory
        operatorInformation:
          identifier: identifier
        warrantyPeriod: warrantyPeriod
        productIdentifier: productIdentifier
        puttingIntoService: 2000-01-23T04:56:07.000+00:00
        batteryMass: 6.878052220127876
        manufacturingDate: 2000-01-23T04:56:07.000+00:00
        batteryPassportIdentifier: batteryPassportIdentifier
        manufacturerInformation:
          identifier: identifier
        manufacturingPlace:
          postalCode1: postalCode1
    Labeling:
      required:
        - declarationOfConformity
        - labels
        - resultOfTestReport
      type: object
      properties:
        resultOfTestReport:
          type: string
          description: DIN 6.2.8
        declarationOfConformity:
          type: string
          description: DIN 6.2.7
        labels:
          minItems: 4
          type: array
          items:
            $ref: "#/components/schemas/Labeling_labels"
      additionalProperties: false
      description: DIN Cluster - Symbols and conformity
      example:
        resultOfTestReport: resultOfTestReport
        declarationOfConformity: declarationOfConformity
        labels:
          - labelingMeaning: labelingMeaning
            labelingSymbol: labelingSymbol
            labelingSubject: labelingSubject
          - labelingMeaning: labelingMeaning
            labelingSymbol: labelingSymbol
            labelingSubject: labelingSubject
    DigitalBatteryPassport:
      title: Digital Battery Passport
      required:
        - carbonFootprint
        - circularity
        - generalProductInformation
        - labeling
        - materialComposition
        - performance
        - supplyChainDueDiligence
      type: object
      properties:
        materialComposition:
          $ref: "#/components/schemas/MaterialComposition"
        circularity:
          $ref: "#/components/schemas/Circularity"
        supplyChainDueDiligence:
          $ref: "#/components/schemas/SupplyChainDueDiligence"
        performance:
          $ref: "#/components/schemas/Performance"
        dynamicUpdates:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/DynamicUpdate"
        carbonFootprint:
          $ref: "#/components/schemas/CarbonFootprint"
        generalProductInformation:
          $ref: "#/components/schemas/GeneralProductInformation"
        labeling:
          $ref: "#/components/schemas/Labeling"
      additionalProperties: false
      example:
        circularity:
          renewableContent: 0.8008281904610115
          recycledContent:
            - recycledMaterial: recycledMaterial
              postConsumerShare: 6.027456183070403
              preConsumerShare: 1.4658129805029452
            - recycledMaterial: recycledMaterial
              postConsumerShare: 6.027456183070403
              preConsumerShare: 1.4658129805029452
            - recycledMaterial: recycledMaterial
              postConsumerShare: 6.027456183070403
              preConsumerShare: 1.4658129805029452
            - recycledMaterial: recycledMaterial
              postConsumerShare: 6.027456183070403
              preConsumerShare: 1.4658129805029452
          endOfLifeInformation:
            wastePrevention: wastePrevention
            separateCollection: separateCollection
            informationOnCollection: informationOnCollection
          sparePartSources:
            - components:
                - partName: partName
                - partName: partName
              nameOfSupplier: nameOfSupplier
            - components:
                - partName: partName
                - partName: partName
              nameOfSupplier: nameOfSupplier
        generalProductInformation:
          batteryCategory: batteryCategory
          operatorInformation:
            identifier: identifier
          warrantyPeriod: warrantyPeriod
          productIdentifier: productIdentifier
          puttingIntoService: 2000-01-23T04:56:07.000+00:00
          batteryMass: 6.878052220127876
          manufacturingDate: 2000-01-23T04:56:07.000+00:00
          batteryPassportIdentifier: batteryPassportIdentifier
          manufacturerInformation:
            identifier: identifier
          manufacturingPlace:
            postalCode1: postalCode1
        performance:
          batteryCondition:
