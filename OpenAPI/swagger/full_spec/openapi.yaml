  /bo/dbp/:
    get:
      tags:
        - Back Office API DBP
      summary: Get a passport for Tier1 (public) access
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigitalBatteryPassport'
        '400':
