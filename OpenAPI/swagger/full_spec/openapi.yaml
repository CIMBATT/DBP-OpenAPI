                $ref: '#/components/schemas/DigitalBatteryPassport'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: provided API key is not valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Not Found
        '500':
          description: Internal Server
    put:
      tags:
        - DigitalBatteryPassport
      summary: >-
        Fully update a resource of type DigitalBatteryPassport or create it if
        it does not exist.
      description: >-
        Fully update a resource of type rootElement or create it if it does not
        exist.
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitalBatteryPassport'
      responses:
